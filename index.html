<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ميثاق — نظام مصادقة مبسّط</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="nav">
    <div class="brand">
      <span class="logo">◆</span>
      <span>ميثاق</span>
    </div>
    <div class="nav-status" id="navStatus"></div>
  </nav>

  <main class="main">
    <!-- شاشة المصادقة -->
    <section class="auth-wrap" id="authView">
      <div class="auth-card">
        <div class="auth-head">
          <h1 id="authTitle">مرحبًا بعودتك</h1>
          <p id="authSubtitle">سجّل الدخول للمتابعة إلى حسابك</p>
        </div>

        <div class="tabs">
          <button class="tab active" data-mode="signin">تسجيل الدخول</button>
          <button class="tab" data-mode="signup">إنشاء حساب</button>
        </div>

        <form id="authForm" class="form" novalidate>
          <div class="field" id="nameField" hidden>
            <label for="name">الاسم</label>
            <input type="text" id="name" autocomplete="name" placeholder="اسمك الكامل" />
          </div>
          <div class="field">
            <label for="email">البريد الإلكتروني</label>
            <input type="email" id="email" autocomplete="email" placeholder="you@example.com" />
          </div>
          <div class="field">
            <label for="password">كلمة المرور</label>
            <input type="password" id="password" autocomplete="current-password" placeholder="••••••••" />
          </div>
          <p class="message" id="message"></p>
          <button type="submit" class="btn-primary" id="submitBtn">تسجيل الدخول</button>
        </form>

        <p class="foot-note">🔒 نسخة تعليمية — البيانات تُحفظ محليًا في متصفحك فقط.</p>
      </div>
    </section>

    <!-- لوحة التحكم -->
    <section class="dash-wrap" id="dashView" hidden>
      <div class="dash-card">
        <div class="avatar" id="avatar">؟</div>
        <h2 id="welcome">أهلاً</h2>
        <p class="muted" id="dashEmail"></p>
        <div class="info-row">
          <span>تاريخ الإنشاء</span>
          <strong id="createdAt">—</strong>
        </div>
        <div class="info-row">
          <span>آخر دخول</span>
          <strong id="lastLogin">—</strong>
        </div>
        <button class="btn-secondary" id="logoutBtn">تسجيل الخروج</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
